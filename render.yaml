# Blueprint de deploy no Render (Static Site, sem build de framework).
# O "buildCommand" gera o arquivo config.js a partir das variáveis de
# ambiente, mantendo as chaves fora do repositório.
#
# Em Environment, defina:
#   SUPABASE_URL        -> URL do projeto Supabase
#   SUPABASE_ANON_KEY   -> chave "anon public" (segura para o navegador)
services:
  - type: web
    name: painel-controle-caixa-itens-cabelo
    runtime: static
    buildCommand: >
      printf "window.APP_CONFIG={SUPABASE_URL:'%s',SUPABASE_ANON_KEY:'%s'};"
      "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > config.js
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
